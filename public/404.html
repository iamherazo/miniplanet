<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>MiniPlanet</title>
    <script>
      // SPA redirect trick for GitHub Pages
      // Encodes the current path as a query param and redirects to index.html
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
